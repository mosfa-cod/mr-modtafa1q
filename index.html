 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سلمى ويوسف · تعلّم الإنجليزية</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --salma:#FF3D9A;--salma-g:rgba(255,61,154,.3);
  --youssef:#3B7BFF;--youssef-g:rgba(59,123,255,.3);
  --gold:#FFB800;--teal:#00D4AA;--purple:#7C4DFF;
  --bg:#080B1A;--card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);
  --t1:#fff;--t2:rgba(255,255,255,.75);--t3:rgba(255,255,255,.42);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.25,.46,.45,.94);
  /* Theme backgrounds per topic */
  --theme-bg1:#080B1A;--theme-bg2:#0D1228;
  --theme-accent1:rgba(124,77,255,.12);--theme-accent2:rgba(255,61,154,.1);
}
/* Light mode */
body.light{
  --bg:#F0F4FF;--card:rgba(255,255,255,.7);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --t1:#1A1040;--t2:rgba(26,16,64,.75);--t3:rgba(26,16,64,.42);
  --theme-bg1:#E8EDFF;--theme-bg2:#DDE5FF;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{font-family:'Baloo Bhaijaan 2',sans-serif;background:var(--bg);color:var(--t1);transition:background .4s;}

/* ═══ BACKGROUND ═══ */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:all .8s var(--ease);}
.bg-layer::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 60% at 15% 10%,var(--theme-accent1) 0%,transparent 60%),
             radial-gradient(ellipse 70% 55% at 85% 85%,var(--theme-accent2) 0%,transparent 60%),
             linear-gradient(175deg,var(--theme-bg1) 0%,var(--theme-bg2) 100%);
  transition:all .8s;}

/* ═══ APP SHELL ═══ */
.app{position:relative;z-index:10;width:100%;max-width:480px;height:100dvh;
  margin:0 auto;display:flex;flex-direction:column;overflow:hidden;}

/* ═══ HEADER ═══ */
.header{flex-shrink:0;padding:12px 16px 6px;display:flex;align-items:center;
  justify-content:space-between;gap:8px;}
.hdr-left{display:flex;align-items:center;gap:8px;}
.logo{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--salma),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 4px 14px var(--salma-g);}
.brand{display:flex;flex-direction:column;line-height:1.1;}
.brand-title{font-size:14px;font-weight:900;
  background:linear-gradient(120deg,var(--salma),var(--gold),var(--youssef));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:10px;color:var(--t3);font-weight:600;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.xp-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;}
.xp-icon{font-size:13px;}
.xp-val{font-size:12px;font-weight:800;color:var(--gold);}

/* ═══ MAIN CARD ═══ */
.card{flex:1;min-height:0;margin:0 10px;border-radius:28px;
  background:linear-gradient(160deg,rgba(20,12,50,.92) 0%,rgba(8,11,26,.96) 100%);
  border:1px solid var(--border);
  box-shadow:0 30px 80px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04) inset,
             0 1px 0 rgba(255,255,255,.07) inset;
  backdrop-filter:blur(24px);display:flex;flex-direction:column;
  overflow:hidden;position:relative;padding: 20px;text-align: center;justify-content: center;}
body.light .card{background:linear-gradient(160deg,rgba(255,255,255,.9) 0%,rgba(240,244,255,.95) 100%);}

.content-title { font-size: 28px; margin-bottom: 10px; color: var(--gold); }
.content-text { font-size: 18px; color: var(--t2); margin-bottom: 20px; }
</style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="app">
        <!-- الهيدر العلوي وعرض النقاط -->
        <div class="header">
            <div class="hdr-left">
                <div class="logo">✨</div>
                <div class="brand">
                    <span class="brand-title">سلمى ويوسف</span>
                    <span class="brand-sub">تعلّم الإنجليزية</span>
                </div>
            </div>
            <div class="hdr-right">
                <div class="xp-pill">
                    <span class="xp-icon">⚡</span>
                    <span id="score-counter" class="xp-val">جاري التحميل...</span>
                </div>
            </div>
        </div>

        <!-- الكارت الرئيسي الذي يعرض البيانات ديناميكياً -->
        <div class="card">
            <div id="app-title" class="content-title">تحميل التطبيق...</div>
            <div id="app-description" class="content-text">يرجى الانتظار، جاري الاتصال بالخادم الآمن.</div>
        </div>
    </div>    <!-- نظام جلب البيانات السحري و     <!-- نظام جلب البيانات المباشر المتصل بـ Firestore العام الخاص بك -->
    <script>

        function handleEducationalData(data) {

    <!-- استدعاء الرابط كملف سكريبت خارجي مع دالة callback لتخطي الـ CORS تماماً -->
    <script src="https://googleapis.com"></script>

</body>
</html>
