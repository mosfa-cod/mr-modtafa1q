 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKVZV2MX9EPuje0U5niCB00DknRs2yaA",
  authDomain: "salma-and-youssef.firebaseapp.com",
  databaseURL: "https://salma-and-youssef-default-rtdb.firebaseio.com",
  projectId: "salma-and-youssef",
  storageBucket: "salma-and-youssef.firebasestorage.app",
  messagingSenderId: "522789153495",
  appId: "1:522789153495:web:dc365ecccf8d16d1f7de92"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lessons = [];
let currentLessonIndex = 0;
let currentDialogueIndex = 0;

/* =======================
   تحميل كل الدروس
======================= */
async function start() {
  try {
    console.log("Loading Firebase...");

    const snap = await get(child(ref(db), "lessons"));

    if (!snap.exists()) {
      console.log("No data found");
      return;
    }

    const data = snap.val();

    lessons = Object.keys(data).map(key => ({
      id: key,
      ...data[key]
    }));

    console.log("Lessons loaded:", lessons);

    loadLesson(0);

  } catch (err) {
    console.error("Firebase error:", err);
  }
}

/* =======================
   تحميل درس معين
======================= */
function loadLesson(index) {
  currentLessonIndex = index;
  currentDialogueIndex = 0;
  renderDialogue();
}

/* =======================
   عرض الحوار
======================= */
function renderDialogue() {
  const lesson = lessons[currentLessonIndex];
  if (!lesson) return;

  const dialogues = Object.values(lesson.dialogues || {});
  const d = dialogues[currentDialogueIndex];

  if (!d) return;

  document.getElementById("enTxt").textContent = d.english_text || "";
  document.getElementById("arTxt").textContent = d.arabic_text || "";
}

/* =======================
   NEXT
======================= */
window.next = function () {
  const lesson = lessons[currentLessonIndex];
  const dialogues = Object.values(lesson.dialogues || {});

  if (currentDialogueIndex < dialogues.length - 1) {
    currentDialogueIndex++;
    renderDialogue();
  } else {
    if (currentLessonIndex < lessons.length - 1) {
      loadLesson(currentLessonIndex + 1);
    } else {
      alert("🎉 انتهيت من كل الدروس!");
    }
  }
};

/* =======================
   PREV
======================= */
window.prev = function () {
  if (currentDialogueIndex > 0) {
    currentDialogueIndex--;
    renderDialogue();
  } else if (currentLessonIndex > 0) {
    loadLesson(currentLessonIndex - 1);
  }
};

/* =======================
   تشغيل
======================= */
start();
</script>
