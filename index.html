 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلمى ويوسف</title>

<style>
body{
  font-family: Arial;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
  padding:40px;
}
#loading{
  color:#ffcc00;
  font-weight:bold;
}
.card{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:#151a2c;
}
button{
  margin:10px;
  padding:10px 20px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="loading">⏳ جارٍ التحميل...</div>

<div class="card">
  <h2 id="enTxt">---</h2>
  <p id="arTxt">---</p>
</div>

<button onclick="prev()">◀ السابق</button>
<button onclick="next()">التالي ▶</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKVZV2MX9EPuje0U5niCB00DknRs2yaA",
  authDomain: "salma-and-youssef.firebaseapp.com",
  databaseURL: "https://salma-and-youssef-default-rtdb.firebaseio.com",
  projectId: "salma-and-youssef",
  storageBucket: "salma-and-youssef.firebasestorage.app",
  messagingSenderId: "522789153495",
  appId: "1:522789153495:web:dc365ecccf8d16d1f7de92"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lessons = [];
let lessonIndex = 0;
let dialogueIndex = 0;

/* =========================
   تحميل البيانات
========================= */
async function start(){
  try{
    console.log("Loading Firebase...");

    const snap = await get(child(ref(db), "lessons/lesson1/dialogues"));

    if(!snap.exists()){
      console.log("No data found ❌");
      document.getElementById("loading").innerText = "لا توجد بيانات";
      return;
    }

    const data = Object.values(snap.val());

    lessons = data;

    document.getElementById("loading").style.display = "none";

    render();

  }catch(err){
    console.error("Firebase Error:", err);
  }
}

/* =========================
   عرض البيانات
========================= */
function render(){
  const item = lessons[dialogueIndex];
  if(!item) return;

  document.getElementById("enTxt").textContent = item.english_text;
  document.getElementById("arTxt").textContent = item.arabic_text;
}

/* =========================
   التالي
========================= */
window.next = function(){
  if(dialogueIndex < lessons.length - 1){
    dialogueIndex++;
    render();
  }else{
    alert("🎉 انتهت الدروس");
  }
}

/* =========================
   السابق
========================= */
window.prev = function(){
  if(dialogueIndex > 0){
    dialogueIndex--;
    render();
  }
}

/* =========================
   تشغيل
========================= */
start();

</script>

</body>
</html>
